    <script>

        // new backend..
        let teamsData = [];
  fetch("http://localhost:5000/api/teams")
  .then(res => res.json())
  .then(data => {
    const table = document.getElementById("teamTable");
    data.forEach(team => {
      const row = table.insertRow();
      row.insertCell(0).innerText = team.teamName;
      row.insertCell(1).innerText = team.leaderName;
      row.insertCell(2).innerText = team.email;
      row.insertCell(3).innerText = team.score;
    });
  });
// done;

document.addEventListener("DOMContentLoaded", () => {
const token = sessionStorage.getItem("token");
const urlParams = new URLSearchParams(window.location.search);
const hackathonId = urlParams.get("id");

if (!hackathonId) return;

fetch(`http://localhost:5000/api/form/hackathon/${hackathonId}/teams`, {
headers: { Authorization: "Bearer " + token }
})
.then(res => res.json())
.then(data => {
// Convert backend data to required format
teamsData = data.map((team, index) => ({
id: team._id,
name: team.teamName || `Team ${index + 1}`,
leader: team.leaderName,
registrationDate: team.registeredAt || new Date().toISOString(),
phone: team.phone,
members: team.members || [],
theme: team.theme,
projectTitle: team.fileName || "N/A",
projectDescription: team.mainIdea || "N/A",
projectFile: team.fileName || "N/A",
status: "active",
hasNewIdea: false // agar tu new idea flag use kar raha
}));
  filteredTeams = [...teamsData];
  renderTeams();
})
.catch(err => {
  console.error("❌ Failed to fetch teams:", err);
});
});


        let filteredTeams = [...teamsData];
        let currentPage = 1;
        const teamsPerPage = 6;

        function renderTeams() {
            const teamsGrid = document.getElementById('teamsGrid');
            const totalTeams = document.getElementById('totalTeams');

            totalTeams.textContent = filteredTeams.length;

            if (filteredTeams.length === 0) {
                teamsGrid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <i class="fas fa-users-slash"></i>
                        <h3>No teams found</h3>
                        <p>Try adjusting your search or filter criteria</p>
                    </div>
                `;
                return;
            }

            const startIndex = (currentPage - 1) * teamsPerPage;
            const endIndex = startIndex + teamsPerPage;
            const teamsToShow = filteredTeams.slice(startIndex, endIndex);

            teamsGrid.innerHTML = teamsToShow.map(team => `
                <div class="team-card">
                    <div class="team-header">
                        <div>
                            <div class="team-name">${team.name}</div>
                            <div class="team-id">ID: ${team.id}</div>
                        </div>
                        <div class="team-status ${team.status === 'active' ? 'status-active' : 'status-pending'}">
                            ${team.status}
                        </div>
                    </div>
                    
                    <div class="team-info">
                        <div class="info-row">
                            <span class="info-label">Team Leader:</span>
                            <span class="info-value">${team.leader}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Registration:</span>
                            <span class="info-value">${new Date(team.registrationDate).toLocaleDateString()}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Contact:</span>
                            <span class="info-value">${team.phone}</span>
                        </div>
                    </div>

                    <div class="team-members">
                        <div class="members-title">
                            <i class="fas fa-user-friends"></i>
                            Members (${team.members.length})
                        </div>
                        <div class="member-list">
                            ${team.members.map(member => `<span class="member-tag">${member}</span>`).join('')}
                        </div>
                    </div>

<div class="team-actions">
    <button class="action-btn btn-view" onclick="viewTeam('${team.id}')">
        <i class="fas fa-eye"></i>
        View Details
    </button>
    ${team.hasNewIdea && team.newIdeaStatus === 'pending' ? `
    <button class="action-btn btn-pending" title="Has pending new idea request">
        <i class="fas fa-clock"></i>
        New Idea
    </button>
    ` : ''}
</div>
                </div>
            `).join('');

            renderPagination();
        }

        function renderPagination() {
            const pagination = document.getElementById('pagination');
            const totalPages = Math.ceil(filteredTeams.length / teamsPerPage);

            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }

            let paginationHTML = '';

            // Previous button
            if (currentPage > 1) {
                paginationHTML += `<button class="page-btn" onclick="changePage(${currentPage - 1})">
                    <i class="fas fa-chevron-left"></i>
                </button>`;
            }

            // Page numbers
            for (let i = 1; i <= totalPages; i++) {
                if (i === currentPage || i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
                    paginationHTML += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">
                        ${i}
                    </button>`;
                } else if (i === currentPage - 2 || i === currentPage + 2) {
                    paginationHTML += `<span>...</span>`;
                }
            }

            // Next button
            if (currentPage < totalPages) {
                paginationHTML += `<button class="page-btn" onclick="changePage(${currentPage + 1})">
                    <i class="fas fa-chevron-right"></i>
                </button>`;
            }

            pagination.innerHTML = paginationHTML;
        }

        function changePage(page) {
            currentPage = page;
            renderTeams();
        }

        function filterTeams() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const statusFilter = document.getElementById('statusFilter').value;

            filteredTeams = teamsData.filter(team => {
                const matchesSearch = team.name.toLowerCase().includes(searchTerm) ||
                    team.leader.toLowerCase().includes(searchTerm) ||
                    team.college.toLowerCase().includes(searchTerm) ||
                    team.id.toLowerCase().includes(searchTerm);

                const matchesStatus = statusFilter === 'all' || team.status === statusFilter;

                return matchesSearch && matchesStatus;
            });

            currentPage = 1;
            renderTeams();
        }

                            </div>

}

// Function to close modal
function closeTeamModal() {
    const modal = document.getElementById('teamModal');
    if (modal) {
        modal.remove();
    }
}

// Function to handle file download
function downloadFile(fileName) {
    alert(`Downloading: ${fileName}\n\nNote: This would normally download the actual project file.`);
}

// Function to approve new idea
function approveNewIdea(teamId) {
    const team = teamsData.find(t => t.id === teamId);
    if (team) {
        team.newIdeaStatus = 'approved';
        alert(`New idea approved for team ${team.name}!`);
        closeTeamModal();
        renderTeams(); // Refresh the teams display
    }
}

// Function to reject new idea
function rejectNewIdea(teamId) {
    const reason = prompt('Please provide a reason for rejection (optional):');
    const team = teamsData.find(t => t.id === teamId);
    if (team) {
        team.newIdeaStatus = 'rejected';
        alert(`New idea rejected for team ${team.name}.${reason ? `\nReason: ${reason}` : ''}`);
        closeTeamModal();
        renderTeams(); // Refresh the teams display
    }
}

// Profile management functions
function editProfile() {
    // Get current profile values
    const currentName = document.getElementById('profileName').textContent;
    const currentEmail = document.getElementById('profileEmail').textContent;
    const currentPhone = document.getElementById('profilePhone').textContent;
    
    // Populate the edit form
    document.getElementById('editProfileName').value = currentName;
    document.getElementById('editProfileEmail').value = currentEmail;
    document.getElementById('editProfilePhone').value = currentPhone;
    
    // Show the modal
    document.getElementById('profileEditModal').style.display = 'flex';
    
    // Close the profile dropdown
    document.getElementById('profileDropdown').classList.remove('show');
}

function saveProfile() {
    // Get new values
    const newName = document.getElementById('editProfileName').value.trim();
    const newEmail = document.getElementById('editProfileEmail').value.trim();
    const newPhone = document.getElementById('editProfilePhone').value.trim();
    
    // Validate inputs
    if (!newName || !newEmail || !newPhone) {
        alert('Please fill in all fields');
        return;
    }
    
    // Email validation
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(newEmail)) {
        alert('Please enter a valid email address');
        return;
    }
    
    // Phone validation (basic)
    const phoneRegex = /^[\+]?[1-9][\d]{0,15}$/;
    if (!phoneRegex.test(newPhone.replace(/[\s\-\(\)]/g, ''))) {
        alert('Please enter a valid phone number');
        return;
    }
    
    // Update profile display
    document.getElementById('profileName').textContent = newName;
    document.getElementById('profileEmail').textContent = newEmail;
    document.getElementById('profilePhone').textContent = newPhone;
    
    // Close modal
    closeProfileEdit();
    
    // Show success message
    alert('Profile updated successfully! 🎉');
}

function closeProfileEdit() {
    document.getElementById('profileEditModal').style.display = 'none';
}

// Close modal when clicking outside
document.addEventListener('click', function(e) {
    const modal = document.getElementById('profileEditModal');
    if (e.target === modal) {
        closeProfileEdit();
    }
});
