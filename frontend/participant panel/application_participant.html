<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Applications - HackEase</title>
    <link rel="stylesheet" href="participant.css" />
  </head>

  <body>
   <!-- Navbar -->
    <nav class="navbar">
      <div class="nav-container">
        <a href="participant.html" class="logo">HackEase</a>
        <ul class="nav-links">
          <li><a href="participant.html" class="active">🏠 Home</a></li>
          <li><a href="application_participant.html">📄 My Applications</a></li>
          <li><a href="result_participant.html">🏆 Result</a></li>
          <li><a href="resources_participant.html">📘 Resources</a></li>
          <li><a href="query_participant.html">❓ Query</a></li>
          <li>
            <a href="profile.html" class="profile-btn active">👤 Profile</a>
          </li>
        </ul>
        <ul id="hackathonList"></ul>
        <div class="mobile-nav">
          <button class="mobile-nav-toggle" onclick="toggleMobileNav()">
            ☰
          </button>
          <div class="mobile-nav-menu" id="mobileMenu">
            <a href="participant.html" class="active">🏠 Home</a>
            <a href="application_participant.html">📄 My Applications</a>
            <a href="result_participant.html">🏆 Result</a>
            <a href="resources_participant.html">📘 Resources</a>
            <a href="query_participant.html">❓ Query</a>
          </div>
        </div>
      </div>
    </nav>


    <!-- Main Content -->
    <div class="main-content">
      <!-- My Applications Section -->
      <div id="applications" class="page-section active">
        <h2>📄 My Applications</h2>
        <p>Here are your hackathon registrations and additional ideas:</p>
        <!-- Applications will be rendered here by JavaScript -->
      </div>
    </div>

    <!-- Profile Edit Modal -->
    <div class="profile-edit-overlay" id="profileEditModal">
      <div class="profile-edit-modal">
        <div class="profile-edit-header">
          <h3>✏️ Edit Profile</h3>
        </div>
        <div class="profile-edit-body">
          <form id="profileEditForm">
            <div class="profile-form-group">
              <label for="editProfileName">👤 Full Name</label>
              <input type="text" id="editProfileName" required />
            </div>
            <div class="profile-form-group">
              <label for="editProfileEmail">📧 Email Address</label>
              <input type="email" id="editProfileEmail" required />
            </div>
            <div class="profile-form-group">
              <label for="editProfilePhone">📱 Phone Number</label>
              <input type="tel" id="editProfilePhone" required />
            </div>
          </form>
        </div>
        <div class="profile-edit-footer">
          <button class="btn-save-profile" onclick="saveProfile()">
            💾 Save Changes
          </button>
          <button class="btn-cancel-profile" onclick="closeProfileEdit()">
            ❌ Cancel
          </button>
        </div>
      </div>
    </div>

    <script>
      // newbackend...

      function registerTeam() {
        const team = {
          teamName: document.getElementById("teamName").value,
          members: document.getElementById("members").value.split(","),
          leaderName: document.getElementById("leaderName").value,
          email: document.getElementById("email").value,
          phone: document.getElementById("phone").value,
        };

        fetch("http://localhost:5000/api/form/my-applications", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(team),
        })
          .then((res) => res.json())
          .then((data) => {
            alert("Registered Successfully!");
            console.log(data);
          })
          .catch((err) => alert("Error: " + err.message));
      }
      // done;

      function renderMyApplications() {
const container = document.getElementById("applications");
const token = sessionStorage.getItem("token");

fetch("http://localhost:5000/api/form/my-applications", {
headers: { Authorization: "Bearer " + token }
})
.then(res => res.json())
.then(applications => {
// Group by hackathon ID
const grouped = {};

       applications.forEach(app => {
    const id = app.hackathonId._id || app.hackathonId; // in case it's populated or not
    if (!grouped[id]) grouped[id] = { main: null, additional: [] };

    if (app.type === "Main Registration") {
      grouped[id].main = app;
    } else if (app.type === "Additional Idea") {
      grouped[id].additional.push(app);
    }
  });

  let html = `<h2>📄 My Applications</h2>`;
  const hackathonIds = Object.keys(grouped);

  if (hackathonIds.length === 0) {
    html += "<p>No applications found.</p>";
  } else {
    hackathonIds.forEach(id => {
      const data = grouped[id];
      const main = data.main;
      const additions = data.additional;

      if (!main) return; // only show if main registration exists

      html += `
        <div class="application-card">
          <h4>${main.hackathonId.title}</h4>
          <p><strong>Team:</strong> ${main.teamName}</p>
          <p><strong>Leader:</strong> ${main.leaderName}</p>
          <p><strong>Email:</strong> ${main.email}</p>
          <p><strong>Members:</strong> ${main.members?.join(", ") || "-"}</p>
          <p><strong>Theme:</strong> ${main.theme}</p>
          <p><strong>Idea:</strong> ${main.mainIdea}</p>
          <p><strong>File:</strong> ${main.fileName || "—"}</p>
          <p><strong>Submitted:</strong> ${new Date(main.registeredAt).toLocaleString()}</p>
      `;

      if (additions.length > 0) {
        additions.forEach((idea, idx) => {
          html += `
            <div class="additional-idea">
              <h5>🧠 Additional Idea ${idx + 1}</h5>
              <p><strong>Theme:</strong> ${idea.theme}</p>
              <p><strong>Idea:</strong> ${idea.mainIdea}</p>
              <p><strong>File:</strong> ${idea.fileName || "—"}</p>
              <p><strong>Submitted:</strong> ${new Date(idea.registeredAt).toLocaleString()}</p>
            </div>
          `;
        });
      }

      html += `</div>`;
    });
  }

  container.innerHTML = html;
})
.catch(err => {
  console.error("❌ Error loading applications:", err);
  container.innerHTML = "<p>❌ Failed to load applications.</p>";
});


        container.innerHTML = html;
      }

      function updateAdditionalIdeaStatus(hackathonId, ideaIndex, newStatus) {
        const applications =
          JSON.parse(localStorage.getItem("myApplications")) || [];
        const appIndex = applications.findIndex(
          (app) => app.hackathonId === hackathonId
        );

        if (
          appIndex !== -1 &&
          applications[appIndex].additionalIdeas &&
          applications[appIndex].additionalIdeas[ideaIndex]
        ) {
          applications[appIndex].additionalIdeas[ideaIndex].status = newStatus;
          localStorage.setItem("myApplications", JSON.stringify(applications));
          renderMyApplications();
        }
      }

      function simulateOrganizerActions() {
        setTimeout(() => {
          const applications =
            JSON.parse(localStorage.getItem("myApplications")) || [];
          if (applications.length > 0 && applications[0].additionalIdea) {
            // Simulate first additional idea being accepted
            applications[0].additionalIdea.status = "Accepted";
            localStorage.setItem(
              "myApplications",
              JSON.stringify(applications)
            );
            renderMyApplications();
            console.log("Demo: First additional idea accepted");
          }
        }, 5000);

        setTimeout(() => {
          const applications =
            JSON.parse(localStorage.getItem("myApplications")) || [];
          if (applications.length > 1 && applications[1].additionalIdea) {
            // Simulate second additional idea being rejected
            applications[1].additionalIdea.status = "Rejected";
            localStorage.setItem(
              "myApplications",
              JSON.stringify(applications)
            );
            renderMyApplications();
            console.log("Demo: Second additional idea rejected");
          }
        }, 8000);
      }

      // NAVBAR JAVASCRIPT
      function toggleMobileNav() {
        const menu = document.getElementById("mobileMenu");
        menu.classList.toggle("active");
      }

      function toggleProfileDropdown() {
        const dropdown = document.getElementById("profileDropdown");
        dropdown.classList.toggle("show");
      }

      function logout() {
        if (confirm("Are you sure you want to logout?")) {
          // Simulate logout - redirect to index.html
          window.location.href = "../index.html";
        }
      }

      // Profile management functions
      function editProfile() {
        // Get current profile values
        const currentName = document.getElementById("profileName").textContent;
        const currentEmail =
          document.getElementById("profileEmail").textContent;
        const currentPhone =
          document.getElementById("profilePhone").textContent;
        // Populate the edit form
        document.getElementById("editProfileName").value = currentName;
        document.getElementById("editProfileEmail").value = currentEmail;
        document.getElementById("editProfilePhone").value = currentPhone;
        // Show the modal
        document.getElementById("profileEditModal").style.display = "flex";
        // Close the profile dropdown
        document.getElementById("profileDropdown").classList.remove("show");
      }

      function saveProfile() {
        // Get new values
        const newName = document.getElementById("editProfileName").value.trim();
        const newEmail = document
          .getElementById("editProfileEmail")
          .value.trim();
        const newPhone = document
          .getElementById("editProfilePhone")
          .value.trim();
        // Validate inputs
        if (!newName || !newEmail || !newPhone) {
          alert("Please fill in all fields");
          return;
        }
        // Email validation
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(newEmail)) {
          alert("Please enter a valid email address");
          return;
        }
        // Phone validation (basic)
        const phoneRegex = /^[\+]?[1-9][\d]{0,15}$/;
        if (!phoneRegex.test(newPhone.replace(/[\s\-\(\)]/g, ""))) {
          alert("Please enter a valid phone number");
          return;
        }
        // Update profile display
        document.getElementById("profileName").textContent = newName;
        document.getElementById("profileEmail").textContent = newEmail;
        document.getElementById("profilePhone").textContent = newPhone;
        // Close modal
        closeProfileEdit();
        // Show success message
        alert("Profile updated successfully! 🎉");
      }

      function closeProfileEdit() {
        document.getElementById("profileEditModal").style.display = "none";
      }

      // Close modal when clicking outside
      document.addEventListener("click", function (e) {
        const modal = document.getElementById("profileEditModal");
        if (e.target === modal) {
          closeProfileEdit();
        }
      });

      // Call this function on page load for demo
      document.addEventListener("DOMContentLoaded", function () {
        renderMyApplications();
        simulateOrganizerActions(); // Remove this in production
      });
    </script>
  </body>
</html>
